<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tracker — Jobs · Internships · Projects · Hackathons</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root { --ease: cubic-bezier(0.16,1,0.3,1); }
[data-theme="dark"] {
  --bg:#0e0e10; --bg2:#18181b; --bg3:#27272a;
  --line:#3f3f46; --line2:#52525b;
  --text:#fafafa; --text2:#a1a1aa; --text3:#71717a;
  --pop:#ffffff;
  --shadow:0 1px 3px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.25);
  --shadow-sm:0 1px 2px rgba(0,0,0,.4);
}
[data-theme="light"] {
  --bg:#f5f4f0; --bg2:#ffffff; --bg3:#f0eeea;
  --line:#e2e0db; --line2:#ccc9c2;
  --text:#1c1c1e; --text2:#5c5c63; --text3:#9c9ca0;
  --pop:#000000;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 8px 24px rgba(0,0,0,.05);
  --shadow-sm:0 1px 2px rgba(0,0,0,.06);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg); color:var(--text);
  font-family:'Geist',sans-serif; font-size:14px; line-height:1.5;
  min-height:100vh; transition:background .25s var(--ease),color .25s var(--ease);
  -webkit-font-smoothing:antialiased;
}

/* ── LAYOUT ── */
.app{display:grid;grid-template-columns:210px 1fr;min-height:100vh;}

/* ── SIDEBAR ── */
.sidebar{
  background:var(--bg2); border-right:1px solid var(--line);
  display:flex; flex-direction:column;
  padding:0; position:sticky; top:0; height:100vh; overflow-y:auto;
}
.sidebar-top{padding:22px 18px 18px; border-bottom:1px solid var(--line);}
.wordmark{
  font-family:'Instrument Serif',serif; font-size:22px;
  color:var(--pop); letter-spacing:-.4px; line-height:1;
}
.wordmark-sub{
  font-family:'Geist Mono',monospace; font-size:9.5px;
  color:var(--text3); letter-spacing:.6px; text-transform:uppercase; margin-top:3px;
}
.nav-group{padding:14px 0 4px;}
.nav-group-label{
  font-family:'Geist Mono',monospace; font-size:8.5px;
  text-transform:uppercase; letter-spacing:1.3px;
  color:var(--text3); padding:0 18px; margin-bottom:2px;
}
.nav-btn{
  display:flex; align-items:center; gap:9px;
  padding:8px 18px; cursor:pointer;
  color:var(--text2); font-size:13px; font-weight:400;
  border-left:2px solid transparent;
  transition:all .12s; user-select:none; border:none;
  background:transparent; width:100%; text-align:left;
}
.nav-btn:hover{color:var(--text); background:var(--bg3);}
.nav-btn.active{
  color:var(--text); font-weight:500;
  border-left:2px solid var(--accent);
  background:var(--bg3);
}
.nav-btn .ni{font-size:14px; width:17px; text-align:center; flex-shrink:0;}
.nav-btn .nc{
  margin-left:auto; font-family:'Geist Mono',monospace; font-size:10px;
  background:var(--bg); border:1px solid var(--line); border-radius:20px;
  padding:0 6px; color:var(--text3); min-width:20px; text-align:center;
  line-height:18px;
}
.sidebar-foot{
  margin-top:auto; padding:14px 18px;
  border-top:1px solid var(--line);
}
.theme-btn{
  display:flex; align-items:center; gap:8px;
  width:100%; padding:8px 10px; border-radius:7px;
  background:var(--bg3); border:1px solid var(--line);
  color:var(--text2); font-size:12px; font-family:'Geist',sans-serif;
  font-weight:500; cursor:pointer; transition:all .12s;
}
.theme-btn:hover{border-color:var(--line2); color:var(--text);}

/* ── MAIN ── */
.main{display:flex; flex-direction:column; overflow:hidden;}
.panel{display:none; flex-direction:column; gap:24px; padding:32px 36px; min-height:100vh;}
.panel.active{display:flex;}

/* ── PANEL HEADER ── */
.ph{display:flex; align-items:flex-start; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.ph-left{}
.ph-title{font-family:'Instrument Serif',serif; font-size:26px; color:var(--pop); letter-spacing:-.3px; line-height:1.1;}
.ph-desc{font-family:'Geist Mono',monospace; font-size:10.5px; color:var(--text3); margin-top:3px;}
.ph-actions{display:flex; gap:6px; align-items:center;}

/* ── SUMMARY PILLS (only shown when data exists) ── */
.pills{display:flex; gap:6px; flex-wrap:wrap;}
.pill{
  display:inline-flex; align-items:center; gap:5px;
  padding:4px 10px; border-radius:20px;
  font-family:'Geist Mono',monospace; font-size:10.5px;
  border:1px solid var(--line); background:var(--bg2); color:var(--text2);
}
.pill-dot{width:5px; height:5px; border-radius:50%; flex-shrink:0;}
.pill strong{color:var(--text); font-weight:500;}

/* ── TOOLBAR ── */
.toolbar{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
.search-box{position:relative; flex:1; min-width:160px; max-width:300px;}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}
.search-box input{
  width:100%; padding:8px 10px 8px 32px;
  background:var(--bg2); border:1px solid var(--line); border-radius:7px;
  color:var(--text); font-family:'Geist',sans-serif; font-size:12.5px;
  outline:none; transition:border-color .12s;
}
.search-box input::placeholder{color:var(--text3);}
.search-box input:focus{border-color:var(--line2);}

/* ── BUTTONS ── */
.btn{
  display:inline-flex; align-items:center; gap:5px;
  padding:7px 13px; border-radius:7px; border:none;
  font-family:'Geist',sans-serif; font-size:12px; font-weight:500;
  cursor:pointer; transition:all .12s; white-space:nowrap;
}
.btn:hover{transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn-primary{background:var(--text); color:var(--bg); box-shadow:var(--shadow-sm);}
.btn-primary:hover{opacity:.88;}
.btn-ghost{background:var(--bg2); border:1px solid var(--line); color:var(--text2);}
.btn-ghost:hover{border-color:var(--line2); color:var(--text);}

select.fsel{
  padding:7px 10px; background:var(--bg2); border:1px solid var(--line);
  border-radius:7px; color:var(--text); font-family:'Geist',sans-serif;
  font-size:12px; cursor:pointer; outline:none; transition:border-color .12s;
}
select.fsel:focus{border-color:var(--line2);}
select.fsel option{background:var(--bg2);}

/* ── FORM CARD ── */
.form-card{
  background:var(--bg2); border:1px solid var(--line); border-radius:10px;
  padding:18px 22px;
  animation:sdown .2s var(--ease);
}
@keyframes sdown{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.form-label{
  font-family:'Geist Mono',monospace; font-size:9px;
  text-transform:uppercase; letter-spacing:.6px; color:var(--text3); margin-bottom:14px;
}
.form-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(185px,1fr)); gap:10px;}
.fg{display:flex; flex-direction:column; gap:4px;}
.fg.full{grid-column:1/-1;}
.fg label{font-size:10px; color:var(--text3); font-family:'Geist Mono',monospace; text-transform:uppercase; letter-spacing:.4px;}
.fg input,.fg select,.fg textarea{
  background:var(--bg3); border:1px solid var(--line); border-radius:6px;
  padding:7px 9px; color:var(--text); font-family:'Geist',sans-serif;
  font-size:12.5px; outline:none; transition:border-color .12s; width:100%;
}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--line2);}
.fg textarea{resize:vertical; min-height:56px;}
.fg select option{background:var(--bg);}
.form-actions{margin-top:14px; display:flex; gap:7px;}

/* ── ENTRY CARDS ── */
.entries{display:flex; flex-direction:column; gap:5px;}
.ecard{
  background:var(--bg2); border:1px solid var(--line); border-radius:9px;
  padding:13px 16px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;
  transition:border-color .12s,box-shadow .12s;
  animation:fin .18s var(--ease);
}
@keyframes fin{from{opacity:0;transform:translateY(3px);}to{opacity:1;transform:translateY(0);}}
.ecard:hover{border-color:var(--line2); box-shadow:var(--shadow-sm);}
.ecard-main{flex:1; min-width:0;}
.ename{font-size:14px; font-weight:500; color:var(--pop); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.esub{font-size:12px; color:var(--text2); margin-top:1px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.enotes{font-size:11.5px; color:var(--text3); margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:460px;}
.emeta{display:flex; align-items:center; gap:7px; flex-wrap:wrap;}
.edate{font-family:'Geist Mono',monospace; font-size:10.5px; color:var(--text3);}
.eextra{font-family:'Geist Mono',monospace; font-size:10.5px; color:var(--text2);}
.eactions{display:flex; gap:3px; margin-left:auto;}
.ibtn{
  background:none; border:none; cursor:pointer;
  color:var(--text3); padding:5px 6px; border-radius:5px;
  transition:all .12s; display:flex; align-items:center;
}
.ibtn:hover{background:var(--bg3); color:var(--text);}
.ibtn.del:hover{background:#fee2e2; color:#dc2626;}
[data-theme="dark"] .ibtn.del:hover{background:#3f1212; color:#f87171;}

/* ── BADGES ── */
.badge{
  display:inline-flex; align-items:center;
  padding:2px 8px; border-radius:4px;
  font-family:'Geist Mono',monospace; font-size:10px; font-weight:500; letter-spacing:.15px;
}
.b-applied   {background:#1e3350;color:#60a5fa;}
.b-interview {background:#2e1a4a;color:#c084fc;}
.b-offer     {background:#052e1c;color:#4ade80;}
.b-rejected  {background:#3b0f0f;color:#f87171;}
.b-inprogress{background:#052e1c;color:#4ade80;}
.b-completed {background:#1e3350;color:#60a5fa;}
.b-paused    {background:#2e2010;color:#fb923c;}
.b-won       {background:#1c2208;color:#a3e635;}
.b-lost      {background:#2d1414;color:#f87171;}
.b-upcoming  {background:#1a2035;color:#93c5fd;}
.b-submitted {background:#1e2e20;color:#6ee7b7;}
[data-theme="light"] .b-applied   {background:#dbeafe;color:#1d4ed8;}
[data-theme="light"] .b-interview {background:#ede9fe;color:#7c3aed;}
[data-theme="light"] .b-offer     {background:#dcfce7;color:#15803d;}
[data-theme="light"] .b-rejected  {background:#fee2e2;color:#dc2626;}
[data-theme="light"] .b-inprogress{background:#dcfce7;color:#15803d;}
[data-theme="light"] .b-completed {background:#dbeafe;color:#1d4ed8;}
[data-theme="light"] .b-paused    {background:#fff7ed;color:#c2410c;}
[data-theme="light"] .b-won       {background:#ecfccb;color:#3f6212;}
[data-theme="light"] .b-lost      {background:#fee2e2;color:#b91c1c;}
[data-theme="light"] .b-upcoming  {background:#eff6ff;color:#1e40af;}
[data-theme="light"] .b-submitted {background:#f0fdf4;color:#166534;}

.pri-high  {font-size:10.5px;font-family:'Geist Mono',monospace;color:#f87171;}
.pri-medium{font-size:10.5px;font-family:'Geist Mono',monospace;color:#fb923c;}
.pri-low   {font-size:10.5px;font-family:'Geist Mono',monospace;color:var(--text3);}
[data-theme="light"] .pri-high  {color:#dc2626;}
[data-theme="light"] .pri-medium{color:#c2410c;}

.lchip{
  display:inline-flex; align-items:center; gap:3px;
  font-family:'Geist Mono',monospace; font-size:10px;
  color:var(--text3); border:1px solid var(--line);
  border-radius:4px; padding:1px 6px; text-decoration:none;
  transition:all .12s;
}
.lchip:hover{border-color:var(--line2); color:var(--text);}

/* ── EMPTY ── */
.empty{
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:56px 20px; gap:10px;
  border:1.5px dashed var(--line); border-radius:10px;
  background:var(--bg2); color:var(--text3); text-align:center;
}
.empty-icon{font-size:28px; margin-bottom:2px;}
.empty-title{font-size:14.5px; font-weight:500; color:var(--text2);}
.empty-hint{font-size:11.5px; font-family:'Geist Mono',monospace; max-width:240px;}

/* ── MISC ── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
.toast{
  position:fixed; bottom:20px; right:20px;
  background:var(--bg2); border:1px solid var(--line2);
  padding:9px 16px; border-radius:7px; font-size:12px;
  z-index:9999; box-shadow:var(--shadow);
  animation:tup .18s var(--ease);
}
@keyframes tup{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
input[type=file]{display:none;}

@media(max-width:700px){
  .app{grid-template-columns:1fr;}
  .sidebar{display:none;}
  .panel{padding:20px 14px;}
}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="wordmark">Tracker</div>
      <div class="wordmark-sub">personal dashboard</div>
    </div>

    <div class="nav-group">
      <div class="nav-group-label">Applications</div>
      <button class="nav-btn active" data-p="jobs" style="--accent:#60a5fa" onclick="switchPanel('jobs')">
        <span class="ni">💼</span> Jobs
        <span class="nc" id="nc-jobs">—</span>
      </button>
      <button class="nav-btn" data-p="internships" style="--accent:#c084fc" onclick="switchPanel('internships')">
        <span class="ni">🎓</span> Internships
        <span class="nc" id="nc-internships">—</span>
      </button>
    </div>

    <div class="nav-group">
      <div class="nav-group-label">Work</div>
      <button class="nav-btn" data-p="projects" style="--accent:#4ade80" onclick="switchPanel('projects')">
        <span class="ni">🚀</span> Projects
        <span class="nc" id="nc-projects">—</span>
      </button>
      <button class="nav-btn" data-p="hackathons" style="--accent:#fb923c" onclick="switchPanel('hackathons')">
        <span class="ni">⚡</span> Hackathons
        <span class="nc" id="nc-hackathons">—</span>
      </button>
    </div>

    <div class="sidebar-foot">
      <button class="theme-btn" onclick="toggleTheme()">
        <span id="theme-ic">☀️</span>
        <span id="theme-lbl">Light mode</span>
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- JOBS -->
    <div class="panel active" id="panel-jobs">
      <div class="ph">
        <div class="ph-left">
          <div class="ph-title">Job Applications</div>
          <div class="ph-desc">// track every role you've applied to</div>
        </div>
        <div class="ph-actions">
          <button class="btn btn-ghost" onclick="exportCSV('jobs')">↓ CSV</button>
          <button class="btn btn-ghost" onclick="triggerImport('jobs')">↑ Import</button>
          <button class="btn btn-primary" onclick="toggleForm('jobs')">+ Add</button>
        </div>
      </div>
      <div id="pills-jobs" class="pills"></div>
      <div class="toolbar">
        <div class="search-box">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" placeholder="Search…" oninput="onSearch('jobs',this.value)"/>
        </div>
        <select class="fsel" onchange="onFilter('jobs',this.value)">
          <option value="">All statuses</option>
          <option>Applied</option><option>Interview</option><option>Offer</option><option>Rejected</option>
        </select>
      </div>
      <div id="form-jobs"></div>
      <div id="list-jobs" class="entries"></div>
    </div>

    <!-- INTERNSHIPS -->
    <div class="panel" id="panel-internships">
      <div class="ph">
        <div class="ph-left">
          <div class="ph-title">Internships</div>
          <div class="ph-desc">// applied, interviewing, and offers</div>
        </div>
        <div class="ph-actions">
          <button class="btn btn-ghost" onclick="exportCSV('internships')">↓ CSV</button>
          <button class="btn btn-ghost" onclick="triggerImport('internships')">↑ Import</button>
          <button class="btn btn-primary" onclick="toggleForm('internships')">+ Add</button>
        </div>
      </div>
      <div id="pills-internships" class="pills"></div>
      <div class="toolbar">
        <div class="search-box">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" placeholder="Search…" oninput="onSearch('internships',this.value)"/>
        </div>
        <select class="fsel" onchange="onFilter('internships',this.value)">
          <option value="">All statuses</option>
          <option>Applied</option><option>Interview</option><option>Offer</option><option>Rejected</option>
        </select>
      </div>
      <div id="form-internships"></div>
      <div id="list-internships" class="entries"></div>
    </div>

    <!-- PROJECTS -->
    <div class="panel" id="panel-projects">
      <div class="ph">
        <div class="ph-left">
          <div class="ph-title">Projects</div>
          <div class="ph-desc">// personal builds and side work</div>
        </div>
        <div class="ph-actions">
          <button class="btn btn-ghost" onclick="exportCSV('projects')">↓ CSV</button>
          <button class="btn btn-ghost" onclick="triggerImport('projects')">↑ Import</button>
          <button class="btn btn-primary" onclick="toggleForm('projects')">+ Add</button>
        </div>
      </div>
      <div id="pills-projects" class="pills"></div>
      <div class="toolbar">
        <div class="search-box">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" placeholder="Search…" oninput="onSearch('projects',this.value)"/>
        </div>
        <select class="fsel" onchange="onFilter('projects',this.value)">
          <option value="">All statuses</option>
          <option>In Progress</option><option>Completed</option><option>Paused</option>
        </select>
      </div>
      <div id="form-projects"></div>
      <div id="list-projects" class="entries"></div>
    </div>

    <!-- HACKATHONS -->
    <div class="panel" id="panel-hackathons">
      <div class="ph">
        <div class="ph-left">
          <div class="ph-title">Hackathons</div>
          <div class="ph-desc">// competitions, submissions, wins</div>
        </div>
        <div class="ph-actions">
          <button class="btn btn-ghost" onclick="exportCSV('hackathons')">↓ CSV</button>
          <button class="btn btn-ghost" onclick="triggerImport('hackathons')">↑ Import</button>
          <button class="btn btn-primary" onclick="toggleForm('hackathons')">+ Add</button>
        </div>
      </div>
      <div id="pills-hackathons" class="pills"></div>
      <div class="toolbar">
        <div class="search-box">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" placeholder="Search…" oninput="onSearch('hackathons',this.value)"/>
        </div>
        <select class="fsel" onchange="onFilter('hackathons',this.value)">
          <option value="">All statuses</option>
          <option>Upcoming</option><option>In Progress</option><option>Submitted</option><option>Won</option><option>Lost</option>
        </select>
      </div>
      <div id="form-hackathons"></div>
      <div id="list-hackathons" class="entries"></div>
    </div>

  </main>
</div>

<input type="file" id="csv-file" accept=".csv" onchange="handleImport(event)"/>

<script>
// ── SCHEMA ─────────────────────────────────────────────────────────────────

const S = {
  jobs:{
    primary:'company', secondary:'title',
    empty:{title:'No job applications yet', hint:'Hit + Add to log your first one'},
    fields:[
      {k:'company', l:'Company',      t:'text',     r:true},
      {k:'title',   l:'Job Title',    t:'text',     r:true},
      {k:'date',    l:'Date Applied', t:'date',     r:true},
      {k:'status',  l:'Status',       t:'select',   r:true, opts:['Applied','Interview','Offer','Rejected']},
      {k:'link',    l:'Job URL',      t:'url'},
      {k:'priority',l:'Priority',     t:'select',   opts:['High','Medium','Low']},
      {k:'notes',   l:'Notes',        t:'textarea', full:true},
    ],
    summaryFn(rows){
      const c={};rows.forEach(r=>{c[r.status]=(c[r.status]||0)+1;});
      return Object.entries(c).map(([k,v])=>`<div class="pill"><span class="pill-dot" style="background:${sc(k)}"></span><strong>${v}</strong>&nbsp;${k}</div>`).join('');
    }
  },
  internships:{
    primary:'company', secondary:'role',
    empty:{title:'No internships tracked yet', hint:'Add your first internship application'},
    fields:[
      {k:'company',  l:'Company',      t:'text',     r:true},
      {k:'role',     l:'Role',         t:'text',     r:true},
      {k:'date',     l:'Date Applied', t:'date',     r:true},
      {k:'status',   l:'Status',       t:'select',   r:true, opts:['Applied','Interview','Offer','Rejected']},
      {k:'duration', l:'Duration',     t:'text',     ph:'e.g. 3 months'},
      {k:'stipend',  l:'Stipend',      t:'text',     ph:'e.g. ₹20k/mo'},
      {k:'link',     l:'Link',         t:'url'},
      {k:'notes',    l:'Notes',        t:'textarea', full:true},
    ],
    summaryFn(rows){
      const c={};rows.forEach(r=>{c[r.status]=(c[r.status]||0)+1;});
      return Object.entries(c).map(([k,v])=>`<div class="pill"><span class="pill-dot" style="background:${sc(k)}"></span><strong>${v}</strong>&nbsp;${k}</div>`).join('');
    }
  },
  projects:{
    primary:'name', secondary:'tech',
    empty:{title:'No projects yet', hint:'Start tracking your builds here'},
    fields:[
      {k:'name',    l:'Project Name', t:'text',     r:true},
      {k:'tech',    l:'Tech Stack',   t:'text',     ph:'React, Node…'},
      {k:'started', l:'Started',      t:'date'},
      {k:'status',  l:'Status',       t:'select',   r:true, opts:['In Progress','Completed','Paused']},
      {k:'repo',    l:'Repo URL',     t:'url'},
      {k:'demo',    l:'Demo URL',     t:'url'},
      {k:'notes',   l:'Notes',        t:'textarea', full:true},
    ],
    summaryFn(rows){
      const ip=rows.filter(r=>r.status==='In Progress').length;
      const done=rows.filter(r=>r.status==='Completed').length;
      let o='';
      if(ip)   o+=`<div class="pill"><span class="pill-dot" style="background:#4ade80"></span><strong>${ip}</strong>&nbsp;In Progress</div>`;
      if(done) o+=`<div class="pill"><span class="pill-dot" style="background:#60a5fa"></span><strong>${done}</strong>&nbsp;Completed</div>`;
      return o;
    }
  },
  hackathons:{
    primary:'name', secondary:'organizer',
    empty:{title:'No hackathons tracked yet', hint:'Log your next competition'},
    fields:[
      {k:'name',      l:'Hackathon',   t:'text',     r:true},
      {k:'organizer', l:'Organizer',   t:'text'},
      {k:'date',      l:'Date',        t:'date',     r:true},
      {k:'status',    l:'Status',      t:'select',   r:true, opts:['Upcoming','In Progress','Submitted','Won','Lost']},
      {k:'team',      l:'Team Name',   t:'text'},
      {k:'theme',     l:'Theme/Track', t:'text'},
      {k:'prize',     l:'Result',      t:'text'},
      {k:'link',      l:'Link',        t:'url'},
      {k:'notes',     l:'Notes',       t:'textarea', full:true},
    ],
    summaryFn(rows){
      const won=rows.filter(r=>r.status==='Won').length;
      const up=rows.filter(r=>r.status==='Upcoming').length;
      let o='';
      if(won) o+=`<div class="pill"><span class="pill-dot" style="background:#a3e635"></span><strong>${won}</strong>&nbsp;Won</div>`;
      if(up)  o+=`<div class="pill"><span class="pill-dot" style="background:#93c5fd"></span><strong>${up}</strong>&nbsp;Upcoming</div>`;
      return o;
    }
  },
};

function sc(s){
  return {Applied:'#60a5fa',Interview:'#c084fc',Offer:'#4ade80',Rejected:'#f87171',
          'In Progress':'#4ade80',Completed:'#60a5fa',Paused:'#fb923c',
          Won:'#a3e635',Lost:'#f87171',Upcoming:'#93c5fd',Submitted:'#6ee7b7'}[s]||'#a1a1aa';
}
function bc(s){
  return {Applied:'b-applied',Interview:'b-interview',Offer:'b-offer',Rejected:'b-rejected',
          'In Progress':'b-inprogress',Completed:'b-completed',Paused:'b-paused',
          Won:'b-won',Lost:'b-lost',Upcoming:'b-upcoming',Submitted:'b-submitted'}[s]||'b-applied';
}

// ── STATE ──────────────────────────────────────────────────────────────────

const db      = {jobs:[],internships:[],projects:[],hackathons:[]};
const searches= {jobs:'',internships:'',projects:'',hackathons:''};
const filts   = {jobs:'',internships:'',projects:'',hackathons:''};
const formOn  = {jobs:false,internships:false,projects:false,hackathons:false};
let importTgt = null;
let theme     = 'dark';

// ── RENDER ─────────────────────────────────────────────────────────────────

function renderAll(){
  Object.keys(db).forEach(id=>{
    renderCount(id);
    renderPills(id);
    renderList(id);
  });
}

function renderCount(id){
  const el=document.getElementById('nc-'+id);
  el.textContent = db[id].length||'—';
}

function renderPills(id){
  const el=document.getElementById('pills-'+id);
  el.innerHTML = db[id].length ? S[id].summaryFn(db[id]) : '';
}

function renderList(id){
  const el=document.getElementById('list-'+id);
  const schema=S[id];
  let rows=[...db[id]];
  const q=searches[id].toLowerCase();
  if(q) rows=rows.filter(r=>Object.values(r).join(' ').toLowerCase().includes(q));
  const f=filts[id];
  if(f) rows=rows.filter(r=>r.status===f);

  if(!rows.length){
    const isEmpty=!db[id].length;
    el.innerHTML=`
      <div class="empty">
        <div class="empty-icon">${isEmpty?'📭':'🔍'}</div>
        <div class="empty-title">${isEmpty?schema.empty.title:'No matches'}</div>
        <div class="empty-hint">${isEmpty?schema.empty.hint:'Try a different search or filter'}</div>
      </div>`;
    return;
  }
  el.innerHTML=rows.map(r=>card(id,r,schema)).join('');
}

function card(id,r,schema){
  const name=r[schema.primary]||'—';
  const sub=r[schema.secondary]||'';
  const stBadge=r.status?`<span class="badge ${bc(r.status)}">${r.status}</span>`:'';
  const priEl=r.priority?`<span class="pri-${r.priority.toLowerCase()}">${r.priority}</span>`:'';
  const dateEl=(r.date||r.started)?`<span class="edate">${r.date||r.started}</span>`:'';
  const notesEl=r.notes?`<div class="enotes">${r.notes}</div>`:'';

  const extras=[];
  if(r.duration) extras.push(r.duration);
  if(r.stipend)  extras.push(r.stipend);
  if(r.team)     extras.push('🤝 '+r.team);
  if(r.theme)    extras.push(r.theme);
  if(r.prize)    extras.push('🏆 '+r.prize);
  const extraEl=extras.length?`<span class="eextra">${extras.join(' · ')}</span>`:'';

  const links=['link','repo','demo'].filter(k=>r[k]);
  const linkChips=links.map(k=>`<a href="${r[k]}" target="_blank" class="lchip">↗ ${k}</a>`).join('');

  return `
  <div class="ecard" data-id="${r._id}">
    <div class="ecard-main">
      <div class="ename">${name}</div>
      ${sub?`<div class="esub">${sub}</div>`:''}
      ${notesEl}
    </div>
    <div class="emeta">
      ${stBadge}${priEl}${dateEl}${extraEl}${linkChips}
    </div>
    <div class="eactions">
      <button class="ibtn del" onclick="delEntry('${id}','${r._id}')" title="Delete">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
          <path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg>
      </button>
    </div>
  </div>`;
}

// ── FORM ───────────────────────────────────────────────────────────────────

function toggleForm(id){
  formOn[id]=!formOn[id];
  const wrap=document.getElementById('form-'+id);
  if(!formOn[id]){wrap.innerHTML='';return;}
  const today=new Date().toISOString().split('T')[0];
  const schema=S[id];
  wrap.innerHTML=`
    <div class="form-card">
      <div class="form-label">New entry</div>
      <div class="form-grid">
        ${schema.fields.map(f=>`
          <div class="fg ${f.full?'full':''}">
            <label>${f.l}${f.r?' *':''}</label>
            ${fInput(f,today,id)}
          </div>`).join('')}
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="saveEntry('${id}')">Save</button>
        <button class="btn btn-ghost" onclick="toggleForm('${id}')">Cancel</button>
      </div>
    </div>`;
}

function fInput(f,today,id){
  const fid=`f_${id}_${f.k}`;
  if(f.t==='select') return `<select id="${fid}">${f.opts.map(o=>`<option>${o}</option>`).join('')}</select>`;
  if(f.t==='textarea') return `<textarea id="${fid}" placeholder="${f.ph||''}"></textarea>`;
  const isDate=f.t==='date';
  return `<input type="text" id="${fid}" ${isDate?`onfocus="this.type='date'"`:''} ${isDate?`value="${today}"`:''}  placeholder="${f.ph||isDate?'YYYY-MM-DD':''}" />`;
}

function saveEntry(id){
  const schema=S[id];
  const entry={_id:Date.now()+'_'+Math.random().toString(36).slice(2)};
  let ok=true;
  schema.fields.forEach(f=>{
    const el=document.getElementById(`f_${id}_${f.k}`);
    if(!el) return;
    const v=el.value.trim();
    if(f.r&&!v){el.style.borderColor='#f87171';ok=false;return;}
    el.style.borderColor='';
    if(v) entry[f.k]=v;
  });
  if(!ok){toast('Fill in required fields');return;}
  db[id].push(entry);
  toggleForm(id);
  renderAll();
  toast('Saved ✓');
}

// ── ACTIONS ────────────────────────────────────────────────────────────────

function delEntry(id,eid){
  db[id]=db[id].filter(r=>r._id!==eid);
  renderAll();
  toast('Deleted');
}

function onSearch(id,v){searches[id]=v;renderList(id);}
function onFilter(id,v){filts[id]=v;renderList(id);}

function switchPanel(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  document.querySelector(`.nav-btn[data-p="${id}"]`).classList.add('active');
}

// ── THEME ──────────────────────────────────────────────────────────────────

function toggleTheme(){
  theme=theme==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',theme);
  document.getElementById('theme-ic').textContent=theme==='light'?'🌙':'☀️';
  document.getElementById('theme-lbl').textContent=theme==='light'?'Dark mode':'Light mode';
}

// ── CSV ────────────────────────────────────────────────────────────────────

function exportCSV(id){
  if(!db[id].length){toast('Nothing to export');return;}
  const keys=S[id].fields.map(f=>f.k);
  const lines=[keys.join(',')];
  db[id].forEach(r=>lines.push(keys.map(k=>`"${(r[k]||'').replace(/"/g,'""')}"`).join(',')));
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([lines.join('\n')],{type:'text/csv'}));
  a.download=`${id}-${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  toast('CSV exported ↓');
}

function triggerImport(id){importTgt=id;document.getElementById('csv-file').click();}

function handleImport(e){
  const file=e.target.files[0];if(!file) return;
  const id=importTgt;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const lines=ev.target.result.split('\n').filter(l=>l.trim());
      const headers=lines[0].split(',').map(h=>h.trim());
      let count=0;
      for(let i=1;i<lines.length;i++){
        const vals=lines[i].split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/).map(v=>v.replace(/^"|"$/g,'').replace(/""/g,'"'));
        const entry={_id:Date.now()+'_'+Math.random().toString(36).slice(2)};
        headers.forEach((h,j)=>{if(vals[j]?.trim()) entry[h]=vals[j].trim();});
        db[id].push(entry);count++;
      }
      renderAll();
      toast(`Imported ${count} entries ✓`);
    }catch{toast('Import failed');}
  };
  reader.readAsText(file);
  e.target.value='';
}

// ── TOAST ──────────────────────────────────────────────────────────────────

function toast(msg){
  const t=document.createElement('div');
  t.className='toast';t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2000);
}

// ── INIT ───────────────────────────────────────────────────────────────────

renderAll();
</script>
</body>
