<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tracker Pro — Jobs, Internships, Projects & Hackathons</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --surface2: #1a1e29;
    --border: #252a38;
    --border2: #2e3447;
    --text: #e8eaf0;
    --muted: #6b7280;
    --accent-job: #4f8ef7;
    --accent-intern: #a78bfa;
    --accent-project: #34d399;
    --accent-hack: #fb923c;
    --danger: #f87171;
    --success: #34d399;
    --warning: #fbbf24;
    --radius: 10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: linear-gradient(var(--border) 1px, transparent 1px),
                      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 32px 20px 80px; }

  /* HEADER */
  header { margin-bottom: 40px; }
  .header-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #4f8ef7, #a78bfa); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; }
  h1 span { color: var(--accent-job); }
  .subtitle { font-size: 0.8rem; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }

  /* STATS BAR */
  .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 32px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .stat-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, var(--c) 0%, transparent 60%); opacity: 0.06; }
  .stat-card:hover { border-color: var(--border2); }
  .stat-val { font-size: 2rem; font-weight: 800; line-height: 1; color: var(--c); }
  .stat-lbl { font-size: 0.72rem; color: var(--muted); margin-top: 4px; font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.5px; }

  /* TABS */
  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 28px; overflow-x: auto; }
  .tab-btn {
    padding: 10px 20px;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    white-space: nowrap;
    transition: color 0.2s, border-color 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--ac); border-bottom-color: var(--ac); }
  .tab-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ac); }
  .tab-count { font-family: 'DM Mono', monospace; font-size: 0.7rem; background: var(--surface2); border-radius: 20px; padding: 1px 6px; }

  /* PANELS */
  .panel { display: none; }
  .panel.active { display: block; }

  /* TOOLBAR */
  .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .search-wrap { flex: 1; min-width: 200px; position: relative; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  input[type=text], input[type=date], input[type=url], select, textarea {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .search-wrap input { padding-left: 38px; }
  input:focus, select:focus, textarea:focus { border-color: var(--ac, var(--accent-job)); }
  select option { background: var(--surface); }

  .btn {
    padding: 10px 18px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.82rem;
    display: flex; align-items: center; gap: 6px;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn-primary { background: var(--ac, var(--accent-job)); color: #000; }
  .btn-ghost { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
  .btn-danger { background: transparent; border: 1px solid var(--border); color: var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; border-color: var(--danger); }
  .btn-sm { padding: 6px 10px; font-size: 0.75rem; }

  /* ADD FORM */
  .add-form-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
    display: none;
  }
  .add-form-wrap.open { display: block; }
  .form-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 16px; color: var(--ac, var(--accent-job)); }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 0.72rem; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.5px; }
  textarea { resize: vertical; min-height: 70px; }
  .form-actions { margin-top: 16px; display: flex; gap: 8px; }

  /* TABLE */
  .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: var(--surface2);
    padding: 12px 16px;
    text-align: left;
    font-size: 0.7rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
    border-bottom: 1px solid var(--border);
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  td { padding: 12px 16px; font-size: 0.83rem; vertical-align: middle; }
  .empty-row td { text-align: center; padding: 48px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.8rem; }

  /* BADGES */
  .badge {
    display: inline-flex; align-items: center; padding: 3px 9px;
    border-radius: 20px; font-size: 0.68rem; font-weight: 700;
    font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .badge-applied    { background: #1e3a5f; color: #60a5fa; }
  .badge-interview  { background: #2d2254; color: #c4b5fd; }
  .badge-offer      { background: #064e3b; color: #6ee7b7; }
  .badge-rejected   { background: #3f1212; color: #f87171; }
  .badge-inprogress { background: #1c2e1c; color: #6ee7b7; }
  .badge-completed  { background: #1e3448; color: #60a5fa; }
  .badge-paused     { background: #2d2716; color: #fcd34d; }
  .badge-won        { background: #2d1a06; color: #fb923c; }
  .badge-lost       { background: #2a1212; color: #f87171; }
  .badge-upcoming   { background: #1e2d3f; color: #93c5fd; }
  .badge-submitted  { background: #1c2635; color: #7dd3fc; }

  /* ACTIONS */
  .row-actions { display: flex; gap: 4px; }
  .act-btn { background: none; border: none; cursor: pointer; padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; color: var(--muted); transition: background 0.15s, color 0.15s; }
  .act-btn:hover { background: var(--border); color: var(--text); }
  .act-btn.del:hover { background: #3f1212; color: var(--danger); }

  /* INLINE EDIT */
  td.editing input, td.editing select {
    padding: 4px 8px;
    font-size: 0.83rem;
    border-radius: 6px;
    min-width: 100px;
  }

  /* PRIORITY */
  .priority-high   { color: var(--danger); font-weight: 700; }
  .priority-medium { color: var(--warning); }
  .priority-low    { color: var(--muted); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface2); border: 1px solid var(--border2);
    padding: 12px 20px; border-radius: var(--radius);
    font-size: 0.82rem; z-index: 999;
    animation: slideUp 0.3s ease forwards;
    max-width: 300px;
  }
  @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 600px) {
    h1 { font-size: 1.3rem; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <header>
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">🎯</div>
        <div>
          <h1>Tracker <span>Pro</span></h1>
          <div class="subtitle">// jobs · internships · projects · hackathons</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-ghost" onclick="exportCSV()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export CSV
        </button>
        <button class="btn btn-ghost" onclick="importCSVPrompt()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Import CSV
        </button>
        <input type="file" id="csv-file-input" accept=".csv" style="display:none" onchange="handleCSVImport(event)" />
      </div>
    </div>
  </header>

  <!-- STATS -->
  <div class="stats-bar" id="stats-bar"></div>

  <!-- TABS -->
  <div class="tabs" id="tabs"></div>

  <!-- PANELS -->
  <div id="panels"></div>

</div>

<script>
// ── DATA MODEL ──────────────────────────────────────────────────────────────

const SECTIONS = [
  {
    id: 'jobs',
    label: 'Job Applications',
    emoji: '💼',
    accent: '#4f8ef7',
    fields: [
      { key: 'company',  label: 'Company',       type: 'text',   required: true },
      { key: 'title',    label: 'Job Title',      type: 'text',   required: true },
      { key: 'date',     label: 'Date Applied',   type: 'date',   required: true },
      { key: 'status',   label: 'Status',         type: 'select', options: ['Applied','Interview','Offer','Rejected'], required: true },
      { key: 'link',     label: 'Job Link',       type: 'url' },
      { key: 'priority', label: 'Priority',       type: 'select', options: ['High','Medium','Low'] },
      { key: 'notes',    label: 'Notes',          type: 'textarea', full: true },
    ],
    cols: ['company','title','date','status','priority','notes','actions'],
    colLabels: ['Company','Title','Date','Status','Priority','Notes',''],
  },
  {
    id: 'internships',
    label: 'Internships',
    emoji: '🎓',
    accent: '#a78bfa',
    fields: [
      { key: 'company',  label: 'Company',        type: 'text',   required: true },
      { key: 'role',     label: 'Role',            type: 'text',   required: true },
      { key: 'date',     label: 'Date Applied',    type: 'date',   required: true },
      { key: 'status',   label: 'Status',          type: 'select', options: ['Applied','Interview','Offer','Rejected'], required: true },
      { key: 'duration', label: 'Duration',        type: 'text',   placeholder: 'e.g. 3 months' },
      { key: 'stipend',  label: 'Stipend',         type: 'text',   placeholder: 'e.g. ₹20,000/mo' },
      { key: 'link',     label: 'Link',            type: 'url' },
      { key: 'notes',    label: 'Notes',           type: 'textarea', full: true },
    ],
    cols: ['company','role','date','status','duration','stipend','notes','actions'],
    colLabels: ['Company','Role','Date','Status','Duration','Stipend','Notes',''],
  },
  {
    id: 'projects',
    label: 'Projects',
    emoji: '🚀',
    accent: '#34d399',
    fields: [
      { key: 'name',     label: 'Project Name',   type: 'text',   required: true },
      { key: 'tech',     label: 'Tech Stack',      type: 'text',   placeholder: 'React, Node, ...' },
      { key: 'started',  label: 'Started',         type: 'date' },
      { key: 'status',   label: 'Status',          type: 'select', options: ['In Progress','Completed','Paused'], required: true },
      { key: 'repo',     label: 'Repo / Link',     type: 'url' },
      { key: 'demo',     label: 'Demo URL',        type: 'url' },
      { key: 'notes',    label: 'Notes',           type: 'textarea', full: true },
    ],
    cols: ['name','tech','started','status','repo','demo','notes','actions'],
    colLabels: ['Project','Stack','Started','Status','Repo','Demo','Notes',''],
  },
  {
    id: 'hackathons',
    label: 'Hackathons',
    emoji: '⚡',
    accent: '#fb923c',
    fields: [
      { key: 'name',     label: 'Hackathon Name',  type: 'text',   required: true },
      { key: 'organizer',label: 'Organizer',        type: 'text' },
      { key: 'date',     label: 'Date',             type: 'date',   required: true },
      { key: 'status',   label: 'Status',           type: 'select', options: ['Upcoming','Submitted','Won','Lost','In Progress'], required: true },
      { key: 'team',     label: 'Team Name',        type: 'text' },
      { key: 'theme',    label: 'Theme / Track',    type: 'text' },
      { key: 'prize',    label: 'Prize / Result',   type: 'text' },
      { key: 'link',     label: 'Link',             type: 'url' },
      { key: 'notes',    label: 'Notes',            type: 'textarea', full: true },
    ],
    cols: ['name','organizer','date','status','team','theme','prize','notes','actions'],
    colLabels: ['Hackathon','Organizer','Date','Status','Team','Theme','Prize/Result','Notes',''],
  },
];

// ── STATE ───────────────────────────────────────────────────────────────────

let data = { jobs: [], internships: [], projects: [], hackathons: [] };
let activeTab = 'jobs';
let searches = { jobs: '', internships: '', projects: '', hackathons: '' };
let filters  = { jobs: '', internships: '', projects: '', hackathons: '' };
let formOpen = { jobs: false, internships: false, projects: false, hackathons: false };

// ── RENDER ──────────────────────────────────────────────────────────────────

function render() {
  renderStats();
  renderTabs();
  renderPanels();
}

function renderStats() {
  const bar = document.getElementById('stats-bar');
  const totalJobs = data.jobs.length;
  const totalIntern = data.internships.length;
  const totalProjects = data.projects.length;
  const totalHack = data.hackathons.length;

  const jobInterviews = data.jobs.filter(r => r.status === 'Interview').length;
  const jobOffers = data.jobs.filter(r => r.status === 'Offer').length;
  const activeProjects = data.projects.filter(r => r.status === 'In Progress').length;
  const hackWins = data.hackathons.filter(r => r.status === 'Won').length;

  const stats = [
    { val: totalJobs,     lbl: 'Job Apps',     c: '#4f8ef7' },
    { val: totalIntern,   lbl: 'Internships',  c: '#a78bfa' },
    { val: totalProjects, lbl: 'Projects',     c: '#34d399' },
    { val: totalHack,     lbl: 'Hackathons',   c: '#fb923c' },
    { val: jobInterviews, lbl: 'Interviews',   c: '#60a5fa' },
    { val: jobOffers,     lbl: 'Offers',       c: '#34d399' },
    { val: activeProjects,lbl: 'Active Proj.', c: '#6ee7b7' },
    { val: hackWins,      lbl: 'Hack Wins',    c: '#fb923c' },
  ];

  bar.innerHTML = stats.map(s => `
    <div class="stat-card" style="--c:${s.c}">
      <div class="stat-val">${s.val}</div>
      <div class="stat-lbl">${s.lbl}</div>
    </div>
  `).join('');
}

function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = SECTIONS.map(sec => `
    <button
      class="tab-btn ${activeTab === sec.id ? 'active' : ''}"
      style="--ac:${sec.accent}"
      onclick="switchTab('${sec.id}')"
    >
      <span class="tab-dot" style="background:${sec.accent};opacity:${activeTab===sec.id?1:0.3}"></span>
      ${sec.emoji} ${sec.label}
      <span class="tab-count">${data[sec.id].length}</span>
    </button>
  `).join('');
}

function renderPanels() {
  const container = document.getElementById('panels');
  container.innerHTML = SECTIONS.map(sec => `
    <div class="panel ${activeTab === sec.id ? 'active' : ''}" id="panel-${sec.id}">
      ${renderPanel(sec)}
    </div>
  `).join('');
}

function renderPanel(sec) {
  const rows = getFiltered(sec);
  return `
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Search ${sec.label.toLowerCase()}..." value="${searches[sec.id]}"
          oninput="searches['${sec.id}']=this.value; renderPanels(); renderStats();" style="--ac:${sec.accent}" />
      </div>
      ${renderFilterSelect(sec)}
      <button class="btn btn-primary" style="background:${sec.accent}" onclick="toggleForm('${sec.id}')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Entry
      </button>
    </div>
    <div class="add-form-wrap ${formOpen[sec.id] ? 'open' : ''}" id="form-${sec.id}">
      ${renderForm(sec)}
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>${sec.colLabels.map(l => `<th>${l}</th>`).join('')}</tr></thead>
        <tbody>
          ${rows.length === 0
            ? `<tr class="empty-row"><td colspan="${sec.cols.length}">No entries yet — add one above ↑</td></tr>`
            : rows.map(row => renderRow(sec, row)).join('')
          }
        </tbody>
      </table>
    </div>
  `;
}

function renderFilterSelect(sec) {
  const opts = sec.fields.find(f => f.key === 'status')?.options || [];
  if (!opts.length) return '';
  return `
    <select onchange="filters['${sec.id}']=this.value; renderPanels();" style="max-width:160px;--ac:${sec.accent}">
      <option value="">All Statuses</option>
      ${opts.map(o => `<option value="${o}" ${filters[sec.id]===o?'selected':''}>${o}</option>`).join('')}
    </select>
  `;
}

function renderForm(sec) {
  const today = new Date().toISOString().split('T')[0];
  return `
    <div class="form-title">+ New ${sec.label.replace(/s$/, '')}</div>
    <div class="form-grid" id="fg-${sec.id}">
      ${sec.fields.map(f => `
        <div class="form-group ${f.full ? 'full' : ''}">
          <label>${f.label}${f.required ? ' *' : ''}</label>
          ${renderInput(f, '', `fi-${sec.id}-${f.key}`, today)}
        </div>
      `).join('')}
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" style="background:${sec.accent}" onclick="addEntry('${sec.id}')">Save Entry</button>
      <button class="btn btn-ghost" onclick="toggleForm('${sec.id}')">Cancel</button>
    </div>
  `;
}

function renderInput(f, val, id, today) {
  if (f.type === 'select') return `
    <select id="${id}">
      ${f.options.map(o => `<option ${val===o?'selected':''}>${o}</option>`).join('')}
    </select>`;
  if (f.type === 'textarea') return `<textarea id="${id}" rows="2">${val||''}</textarea>`;
  return `<input type="${f.type==='url'?'text':'text'}" id="${id}" value="${val||''}" 
    placeholder="${f.placeholder||''}" ${f.type==='date'?`type="date" value="${val||today}"`:''}
    ${f.type==='date'?`id="${id}"`:''} />`;
}

function renderRow(sec, row) {
  return `<tr data-id="${row._id}">
    ${sec.cols.map(col => {
      if (col === 'actions') return `<td>
        <div class="row-actions">
          <button class="act-btn del" onclick="deleteEntry('${sec.id}','${row._id}')" title="Delete">🗑</button>
        </div>
      </td>`;
      if (col === 'status') return `<td>${badgeHtml(row.status)}</td>`;
      if (col === 'priority') return `<td class="priority-${(row.priority||'').toLowerCase()}">${row.priority||'—'}</td>`;
      if (col === 'repo' || col === 'demo' || col === 'link') {
        const v = row[col];
        return `<td>${v ? `<a href="${v}" target="_blank" style="color:${sec.accent};font-family:'DM Mono',monospace;font-size:0.75rem;">↗ link</a>` : '—'}</td>`;
      }
      const v = row[col];
      return `<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${v||''}">${v||'—'}</td>`;
    }).join('')}
  </tr>`;
}

function badgeHtml(status) {
  const map = {
    'Applied':'badge-applied','Interview':'badge-interview','Offer':'badge-offer','Rejected':'badge-rejected',
    'In Progress':'badge-inprogress','Completed':'badge-completed','Paused':'badge-paused',
    'Won':'badge-won','Lost':'badge-lost','Upcoming':'badge-upcoming','Submitted':'badge-submitted',
  };
  const cls = map[status] || 'badge-applied';
  return `<span class="badge ${cls}">${status}</span>`;
}

// ── ACTIONS ──────────────────────────────────────────────────────────────────

function switchTab(id) {
  activeTab = id;
  render();
}

function toggleForm(secId) {
  formOpen[secId] = !formOpen[secId];
  render();
}

function addEntry(secId) {
  const sec = SECTIONS.find(s => s.id === secId);
  const entry = { _id: Date.now().toString() };
  let valid = true;

  for (const f of sec.fields) {
    const el = document.getElementById(`fi-${secId}-${f.key}`);
    if (!el) continue;
    const val = el.value.trim();
    if (f.required && !val) { el.style.borderColor = 'var(--danger)'; valid = false; continue; }
    el.style.borderColor = '';
    entry[f.key] = val;
  }

  if (!valid) { toast('⚠️ Please fill in required fields'); return; }
  data[secId].push(entry);
  formOpen[secId] = false;
  render();
  toast('✓ Entry added');
}

function deleteEntry(secId, id) {
  data[secId] = data[secId].filter(r => r._id !== id);
  render();
  toast('🗑 Entry deleted');
}

function getFiltered(sec) {
  let rows = [...data[sec.id]];
  const q = searches[sec.id].toLowerCase();
  const f = filters[sec.id];
  if (q) rows = rows.filter(r => Object.values(r).join(' ').toLowerCase().includes(q));
  if (f) rows = rows.filter(r => r.status === f);
  return rows;
}

// ── CSV ──────────────────────────────────────────────────────────────────────

function exportCSV() {
  const lines = [];
  for (const sec of SECTIONS) {
    if (!data[sec.id].length) continue;
    lines.push(`## ${sec.label}`);
    const keys = sec.fields.map(f => f.key);
    lines.push(keys.join(','));
    data[sec.id].forEach(r => {
      lines.push(keys.map(k => `"${(r[k]||'').replace(/"/g,'""')}"`).join(','));
    });
    lines.push('');
  }
  const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `tracker-export-${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  toast('✓ CSV exported');
}

function importCSVPrompt() { document.getElementById('csv-file-input').click(); }

function handleCSVImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const lines = ev.target.result.split('\n').map(l => l.trim()).filter(Boolean);
      let currentSec = null;
      let headers = [];
      let imported = 0;

      for (const line of lines) {
        if (line.startsWith('##')) {
          const label = line.replace('##','').trim();
          currentSec = SECTIONS.find(s => s.label === label);
          headers = [];
        } else if (currentSec && !headers.length) {
          headers = line.split(',');
        } else if (currentSec && headers.length) {
          const vals = line.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/).map(v => v.replace(/^"|"$/g,'').replace(/""/g,'"'));
          const entry = { _id: Date.now().toString() + Math.random() };
          headers.forEach((h,i) => { entry[h] = vals[i]||''; });
          data[currentSec.id].push(entry);
          imported++;
        }
      }
      render();
      toast(`✓ Imported ${imported} entries`);
    } catch(err) { toast('⚠️ Import failed — check file format'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ── TOAST ────────────────────────────────────────────────────────────────────

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ── INIT ─────────────────────────────────────────────────────────────────────

render();
</script>
